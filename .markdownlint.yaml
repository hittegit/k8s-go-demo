# .markdownlint.yaml
#
# MD024 with siblings_only allows repeated headings like "### Added" across
# different CHANGELOG.md version sections, while still catching genuine
# duplicate headings within the same section.
MD024:
  siblings_only: true

# Table cells and code blocks frequently exceed 80 chars; wrapping either
# breaks readability or copy-paste usability.
MD013:
  tables: false
  code_blocks: false
