# values.yaml
# Default values for go-demo.
# Override these at install/upgrade time with --set or a custom values file.

replicaCount: 1

image:
  # Use the locally loaded minikube image.
  repository: k8s-go-demo
  pullPolicy: Never
  tag: "local"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false

podAnnotations:
  # Tells Prometheus to scrape this pod for metrics.
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: false

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi

# Point probes at our /health endpoint.
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

autoscaling:
  enabled: false

# Requires the Prometheus Operator CRDs (installed by kube-prometheus-stack).
# Disable if installing go-demo into a cluster without the monitoring stack.
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

# Provisions a Grafana dashboard via a labeled ConfigMap, auto-discovered by
# the kube-prometheus-stack Grafana sidecar. Requires the monitoring stack.
grafanaDashboard:
  enabled: true

volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
